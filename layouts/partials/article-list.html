{{ range .Pages }}
    {{ $src := .Params.image | default "gcs_logo/logo.png" }}
    <article>
        <img src="{{ $src }}"/>
        <h2>
            <a href="{{ .Permalink }}">
                {{ .Title }}
            </a>
        </h2>
        <p>
            {{ .Summary | plainify }}
        </p>
    </article>
{{ end }}
